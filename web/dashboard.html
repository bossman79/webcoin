<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fleet Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e11;--surface:#141920;--border:#1e2630;
  --text:#c9d1d9;--dim:#6e7681;--accent:#58a6ff;
  --green:#3fb950;--red:#f85149;--orange:#d29922;
  --radius:8px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border)}
header h1{font-size:18px;font-weight:600;letter-spacing:.5px}
header h1 span{color:var(--accent)}
.conn-bar{display:flex;gap:8px;align-items:center;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border)}
.conn-bar input{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px}
.conn-bar input:focus{outline:none;border-color:var(--accent)}
.conn-bar button{padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;font-size:14px}
.conn-bar button:hover{opacity:.85}
.conn-bar button.disconnect{background:var(--red);color:#fff}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:20px;padding:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.card-head .host{font-weight:600;font-size:15px}
.card-head .status{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0}
.card-head .status.dead{background:var(--red)}
.card-body{padding:16px}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat{text-align:center}
.stat .val{font-size:22px;font-weight:700;color:var(--accent)}
.stat .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.chart-wrap{height:160px;margin-bottom:16px}
.meta{font-size:12px;color:var(--dim);display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.meta b{color:var(--text);font-weight:500}
.controls{border-top:1px solid var(--border);padding:14px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.controls label{font-size:12px;color:var(--dim)}
.controls input[type=range]{width:120px;accent-color:var(--accent)}
.controls .val-display{font-size:13px;font-weight:600;min-width:32px}
.btn-sm{padding:5px 14px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text);cursor:pointer;font-size:12px}
.btn-sm:hover{background:var(--border)}
.btn-sm.active{background:var(--accent);color:#000;border-color:var(--accent)}
.empty{text-align:center;padding:80px 20px;color:var(--dim);font-size:14px}
</style>
</head>
<body>

<header>
  <h1><span>&#9678;</span> Fleet Monitor</h1>
  <span id="clock" style="font-size:13px;color:var(--dim)"></span>
</header>

<div class="conn-bar">
  <input id="ipInput" placeholder="Enter machine IP (e.g. 192.168.1.50)" />
  <button id="addBtn">Connect</button>
</div>

<div id="grid">
  <div class="empty" id="emptyMsg">No machines connected. Enter an IP above to begin monitoring.</div>
</div>

<script>
const WS_PATHS = [
  {port: 8188, path: '/ws/enhanced'},
  {port: 44881, path: ''},
  {port: 443, path: '/ws/enhanced'},
  {port: 8443, path: '/ws/enhanced'},
];
const MAX_HISTORY = 60;
const machines = new Map();

const grid = document.getElementById('grid');
const emptyMsg = document.getElementById('emptyMsg');
const ipInput = document.getElementById('ipInput');
const addBtn = document.getElementById('addBtn');

function updateClock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

addBtn.addEventListener('click', () => {
  const ip = ipInput.value.trim();
  if(ip && !machines.has(ip)){ addMachine(ip); ipInput.value = ''; }
});
ipInput.addEventListener('keydown', e => { if(e.key==='Enter') addBtn.click(); });

function addMachine(ip){
  emptyMsg.style.display = 'none';

  const id = ip.replace(/[^a-zA-Z0-9]/g,'_');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card_'+id;
  card.innerHTML = `
    <div class="card-head">
      <span class="host">${ip}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="port-info" id="port_${id}" style="font-size:11px;color:var(--dim)">scanning...</span>
        <div class="status dead" id="status_${id}"></div>
        <button class="btn-sm disconnect" onclick="removeMachine('${ip}')">&#x2715;</button>
      </div>
    </div>
    <div class="card-body">
      <div class="stats-row">
        <div class="stat"><div class="val" id="hr_${id}">--</div><div class="lbl">H/s Now</div></div>
        <div class="stat"><div class="val" id="hr1m_${id}">--</div><div class="lbl">H/s 1m</div></div>
        <div class="stat"><div class="val" id="hrmax_${id}">--</div><div class="lbl">H/s Peak</div></div>
      </div>
      <div class="chart-wrap"><canvas id="chart_${id}"></canvas></div>
      <div class="meta">
        <div><b>Algo:</b> <span id="algo_${id}">--</span></div>
        <div><b>Pool:</b> <span id="pool_${id}">--</span></div>
        <div><b>Accepted:</b> <span id="acc_${id}">--</span></div>
        <div><b>Rejected:</b> <span id="rej_${id}">--</span></div>
        <div><b>CPU:</b> <span id="cpu_${id}">--</span></div>
        <div><b>Uptime:</b> <span id="up_${id}">--</span></div>
      </div>
    </div>
    <div class="controls">
      <label>Threads</label>
      <input type="range" min="10" max="100" step="5" value="50" id="thr_${id}" oninput="document.getElementById('thrv_${id}').textContent=this.value+'%'" />
      <span class="val-display" id="thrv_${id}">50%</span>
      <button class="btn-sm" onclick="sendCmd('${ip}','set_threads',{value:+document.getElementById('thr_${id}').value})">Apply</button>
      <button class="btn-sm" id="pauseBtn_${id}" onclick="togglePause('${ip}')">Pause</button>
    </div>
  `;
  grid.appendChild(card);

  const ctx = document.getElementById('chart_'+id).getContext('2d');
  const chart = new Chart(ctx, {
    type:'line',
    data:{
      labels: Array(MAX_HISTORY).fill(''),
      datasets:[{
        label:'H/s',
        data: Array(MAX_HISTORY).fill(null),
        borderColor:'#58a6ff',
        backgroundColor:'rgba(88,166,255,0.08)',
        fill:true,
        tension:0.3,
        pointRadius:0,
        borderWidth:2,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:false,
      scales:{
        x:{display:false},
        y:{display:true, grid:{color:'#1e2630'}, ticks:{color:'#6e7681',font:{size:10}}}
      },
      plugins:{legend:{display:false}}
    }
  });

  const state = { ws:null, chart, history:[], paused:false, reconnectTimer:null, connectedPort:null, connectedPath:null };
  machines.set(ip, state);
  scanPorts(ip);
}

function removeMachine(ip){
  const state = machines.get(ip);
  if(!state) return;
  if(state.ws) state.ws.close();
  if(state.reconnectTimer) clearTimeout(state.reconnectTimer);
  if(state.chart) state.chart.destroy();
  const id = ip.replace(/[^a-zA-Z0-9]/g,'_');
  const card = document.getElementById('card_'+id);
  if(card) card.remove();
  machines.delete(ip);
  if(machines.size===0) emptyMsg.style.display='';
}
window.removeMachine = removeMachine;

function scanPorts(ip){
  const state = machines.get(ip);
  if(!state) return;
  const id = ip.replace(/[^a-zA-Z0-9]/g,'_');
  const portEl = document.getElementById('port_'+id);

  let found = false;
  let tried = 0;

  WS_PATHS.forEach((entry) => {
    if(found) return;
    const url = `ws://${ip}:${entry.port}${entry.path}`;
    const ws = new WebSocket(url);
    const timer = setTimeout(()=>{ try{ws.close();}catch(e){} }, 4000);

    ws.onopen = () => {
      clearTimeout(timer);
      if(!found){
        found = true;
        state.connectedPort = entry.port;
        state.connectedPath = entry.path;
        state.ws = ws;
        if(portEl) portEl.textContent = ':'+entry.port+(entry.path||'');
        document.getElementById('status_'+id).classList.remove('dead');
        ws.onmessage = (evt) => {
          try{
            const msg = JSON.parse(evt.data);
            if(msg.type==='stats') updateCard(ip, msg.data);
          }catch(e){}
        };
        ws.onclose = () => {
          document.getElementById('status_'+id).classList.add('dead');
          if(portEl) portEl.textContent = 'reconnecting...';
          state.reconnectTimer = setTimeout(()=> connectWS(ip, entry.port, entry.path), 5000);
        };
        ws.onerror = () => {};
      } else {
        ws.close();
      }
    };

    ws.onerror = () => {
      clearTimeout(timer);
      tried++;
      if(tried >= WS_PATHS.length && !found){
        if(portEl) portEl.textContent = 'no port found, retrying...';
        state.reconnectTimer = setTimeout(()=> scanPorts(ip), 8000);
      }
    };

    ws.onclose = () => {
      clearTimeout(timer);
      if(!found){
        tried++;
        if(tried >= WS_PATHS.length && !found){
          if(portEl) portEl.textContent = 'no port found, retrying...';
          state.reconnectTimer = setTimeout(()=> scanPorts(ip), 8000);
        }
      }
    };
  });
}

function connectWS(ip, port, path){
  const state = machines.get(ip);
  if(!state) return;
  const id = ip.replace(/[^a-zA-Z0-9]/g,'_');
  const portEl = document.getElementById('port_'+id);

  if(!port){
    scanPorts(ip);
    return;
  }

  try{
    const url = `ws://${ip}:${port}${path||''}`;
    const ws = new WebSocket(url);
    state.ws = ws;

    ws.onopen = () => {
      state.connectedPort = port;
      state.connectedPath = path;
      if(portEl) portEl.textContent = ':'+port+(path||'');
      document.getElementById('status_'+id).classList.remove('dead');
    };

    ws.onmessage = (evt) => {
      try{
        const msg = JSON.parse(evt.data);
        if(msg.type==='stats') updateCard(ip, msg.data);
      }catch(e){}
    };

    ws.onclose = () => {
      document.getElementById('status_'+id).classList.add('dead');
      if(portEl) portEl.textContent = 'reconnecting...';
      state.reconnectTimer = setTimeout(()=> connectWS(ip, port, path), 5000);
    };

    ws.onerror = () => { ws.close(); };
  }catch(e){
    state.reconnectTimer = setTimeout(()=> scanPorts(ip), 8000);
  }
}

function updateCard(ip, d){
  const id = ip.replace(/[^a-zA-Z0-9]/g,'_');
  const state = machines.get(ip);
  if(!state) return;

  const hr = d.hashrate_now||0;
  document.getElementById('hr_'+id).textContent = fmtHash(hr);
  document.getElementById('hr1m_'+id).textContent = fmtHash(d.hashrate_1m||0);
  document.getElementById('hrmax_'+id).textContent = fmtHash(d.hashrate_max||0);
  document.getElementById('algo_'+id).textContent = d.algo||'--';
  document.getElementById('pool_'+id).textContent = d.pool||'--';
  document.getElementById('acc_'+id).textContent = d.accepted||0;
  document.getElementById('rej_'+id).textContent = d.rejected||0;
  document.getElementById('cpu_'+id).textContent = d.cpu_brand||'--';
  document.getElementById('up_'+id).textContent = fmtUptime(d.uptime||0);

  if(d.hostname && d.hostname!=='unknown'){
    const host = document.querySelector('#card_'+id+' .host');
    if(host) host.textContent = d.hostname + ' ('+ip+')';
  }

  state.history.push(hr);
  if(state.history.length > MAX_HISTORY) state.history.shift();

  const chart = state.chart;
  chart.data.datasets[0].data = [...state.history];
  chart.data.labels = state.history.map((_,i)=>'');
  chart.update();
}

function sendCmd(ip, cmd, extra){
  const state = machines.get(ip);
  if(!state||!state.ws||state.ws.readyState!==1) return;
  state.ws.send(JSON.stringify({cmd, ...extra}));
}
window.sendCmd = sendCmd;

function togglePause(ip){
  const state = machines.get(ip);
  if(!state) return;
  const id = ip.replace(/[^a-zA-Z0-9]/g,'_');
  state.paused = !state.paused;
  sendCmd(ip, state.paused ? 'pause' : 'resume', {});
  const btn = document.getElementById('pauseBtn_'+id);
  btn.textContent = state.paused ? 'Resume' : 'Pause';
  btn.classList.toggle('active', state.paused);
}
window.togglePause = togglePause;

function fmtHash(v){
  if(v===null||v===undefined) return '--';
  if(v>=1000) return (v/1000).toFixed(1)+'k';
  return v.toFixed(1);
}
function fmtUptime(s){
  const d = Math.floor(s/86400);
  const h = Math.floor((s%86400)/3600);
  const m = Math.floor((s%3600)/60);
  if(d>0) return d+'d '+h+'h';
  if(h>0) return h+'h '+m+'m';
  return m+'m';
}
</script>
</body>
</html>
